<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard de Facturación</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
}

header h1{
font-size:32px;
}

header p{
margin-top:5px;
color:#cbd5e1;
}

.container{
width:95%;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card h3{
color:#666;
font-size:15px;
}

.card h2{
margin-top:10px;
font-size:34px;
color:#0f172a;
}

.graficos{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:25px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
background:#0f172a;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f8fafc;
}

@media(max-width:900px){

.graficos{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>
<div style="text-align:center;margin:20px 0;">

<a
href="https://wa.me/?text=Hola,%20te%20comparto%20el%20Dashboard%20de%20Facturación:%20https://ezquerracardenasconsultores-ops.github.io/dashboard-facturacion/"
target="_blank"
style="
background:#25D366;
color:white;
padding:15px 30px;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-decoration:none;
display:inline-block;
">

📲 Compartir por WhatsApp

</a>

</div>

<h1>📊 Dashboard de Facturación</h1>

<p>Ezquerra Cárdenas Consultores</p>

</header>

<div class="container">

<div class="cards">

<div class="card">

<h3>Total Facturado</h3>

<h2>S/ 244,464.13</h2>

</div>

<div class="card">

<h3>Base Imponible</h3>

<h2>S/ 206,384.13</h2>

</div>

<div class="card">

<h3>IGV</h3>

<h2>S/ 37,152.00</h2>

</div>

<div class="card">

<h3>Comprobantes</h3>

<h2>9</h2>

</div>

</div>

<div class="graficos">

<div class="box">

<canvas id="barras"></canvas>

</div>

<div class="box">

<canvas id="pastel"></canvas>

</div>

</div>

<h2 style="margin-top:30px;">Detalle de Facturación</h2>

<table>

<thead>

<tr>

<th>Fecha</th>

<th>Factura</th>

<th>Cliente</th>

<th>Total</th>

</tr>

</thead>

<tbody id="detalle">

</tbody>

</table>

</div>

<script>
const facturas=[

["05/06/2026","F001-496","BACKUS",87117.98],
["05/06/2026","F001-497","SAN FERNANDO",35105.00],
["05/06/2026","F001-498","SAN FERNANDO",15788.40],
["08/06/2026","F001-499","QUIMPAC",3168.94],
["10/06/2026","F001-500","CLIENTE",11540.40],
["11/06/2026","F001-501","CLIENTE",12744.00],
["12/06/2026","F001-502","CLIENTE",742.72],
["13/06/2026","F001-503","CLIENTE",3309.23],
["13/06/2026","E001-143","CLIENTE",4737.46]

];

const tbody=document.getElementById("detalle");

facturas.forEach(f=>{

tbody.innerHTML+=`
<tr>
<td>${f[0]}</td>
<td>${f[1]}</td>
<td>${f[2]}</td>
<td>S/ ${f[3].toLocaleString('es-PE',{minimumFractionDigits:2})}</td>
</tr>
`;

});

new Chart(document.getElementById("barras"),{

type:"bar",

data:{

labels:facturas.map(f=>f[1]),

datasets:[{

label:"Facturación (S/)",

data:facturas.map(f=>f[3]),

backgroundColor:[
"#2563EB",
"#16A34A",
"#DC2626",
"#F59E0B",
"#9333EA",
"#06B6D4",
"#84CC16",
"#EC4899",
"#14B8A6"
],

borderRadius:8

}]

},

options:{

responsive:true,

plugins:{
legend:{display:false}
},

scales:{
y:{
beginAtZero:true
}
}

}

});

new Chart(document.getElementById("pastel"),{

type:"doughnut",

data:{

labels:["Backus","San Fernando","Quimpac","Otros"],

datasets:[{

data:[87117.98,50893.40,3168.94,32384.81],

backgroundColor:[
"#2563EB",
"#16A34A",
"#DC2626",
"#F59E0B"
]

}]

},

options:{
responsive:true
}

});

</script>
<!-- Botón flotante de WhatsApp -->
<a href="https://wa.me/?text=Hola,%20te%20comparto%20el%20Dashboard%20de%20Facturación:%20https://ezquerracardenasconsultores-ops.github.io/dashboard-facturacion/"
   target="_blank"
   style="
      position:fixed;
      bottom:25px;
      right:25px;
      width:65px;
      height:65px;
      background:#25D366;
      color:white;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      font-size:34px;
      box-shadow:0 6px 18px rgba(0,0,0,.35);
      z-index:9999;
      transition:.3s;
   "
   onmouseover="this.style.transform='scale(1.1)'"
   onmouseout="this.style.transform='scale(1)'"
   title="Compartir por WhatsApp">

📲

</a>

</body>

</html>
